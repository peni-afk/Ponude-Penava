<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponuda - Gradnja Penava</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 850px; margin: 0 auto; background: #fff; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: relative; min-height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; }
        
        .logo-container { text-align: right; margin-bottom: 20px; }
        .logo-container img { max-width: 100px; height: auto; }

        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; overflow-y: auto; padding: 15px; box-sizing: border-box; }
        #login-trigger { position: fixed; bottom: 20px; right: 20px; font-size: 24px; cursor: pointer; opacity: 0.1; z-index: 1001; }
        
        .header-info { margin-bottom: 20px; }
        .client-box { margin-bottom: 20px; background: #fafafa; padding: 10px; border-radius: 5px; }
        
        input, textarea { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-family: inherit; font-size: 16px; /* 16px sprečava auto-zoom na iPhoneu */ }
        
        .print-text { display: none; white-space: pre-wrap; word-wrap: break-word; font-size: 14px; }

        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th { background: #f8f9fa; border: 1px solid #ddd; padding: 10px; text-align: left; }
        td { border: 1px solid #ddd; padding: 8px; vertical-align: top; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; color: white; display: inline-block; text-align: center; font-size: 14px; }
        .btn-add { background: #4CAF50; width: 100%; margin-bottom: 20px; }
        .btn-save { background: #f39c12; flex: 1; }
        .btn-print { background: #008CBA; flex: 1; }
        
        .totals-wrapper { margin-top: 20px; }
        .totals { float: right; width: 100%; max-width: 300px; }
        .totals div { display: flex; justify-content: space-between; padding: 5px; }
        .grand-total { font-weight: bold; border-top: 2px solid #333; font-size: 1.2em; margin-top: 10px; }

        .footer-content { margin-top: auto; padding-top: 30px; }
        .thanks-msg { text-align: center; font-style: italic; font-weight: bold; margin-top: 30px; }

        /* MOBILNA OPTIMIZACIJA (Ekran manji od 600px) */
        @media screen and (max-width: 600px) {
            .container { padding: 15px; }
            .logo-container { position: static; text-align: center; }
            .header-info, .client-box { width: 100% !important; }
            
            /* Pretvaranje tablice u listu/kartice za lakši unos na mobitelu */
            thead { display: none; }
            tr { display: block; border: 1px solid #ccc; margin-bottom: 15px; padding: 10px; border-radius: 8px; background: #fff; }
            td { display: block; border: none; padding: 5px 0; position: relative; text-align: right; }
            td:before { content: attr(data-label); float: left; font-weight: bold; }
            td:last-child { text-align: center; border-top: 1px solid #eee; margin-top: 5px; }
        }

        /* PRINT POSTAVKE */
        @media print {
            body { padding: 0; background: white; margin: 0; }
            .container { box-shadow: none; padding: 1.5cm; width: 100%; min-height: 100vh; border-radius: 0; display: block; }
            .no-print, .btn, .action-col, #login-trigger, textarea, .desc { display: none !important; }
            .print-text { display: block !important; }
            input { border: none !important; padding: 0 !important; background: transparent !important; margin: 0 !important; height: auto !important; font-size: 14px !important; }
            .logo-container { position: absolute; top: 40px; right: 50px; display: block !important; }
            tr { display: table-row !important; page-break-inside: avoid !important; }
            td { display: table-cell !important; border: 1px solid #ddd !important; text-align: left !important; }
            td:before { content: "" !important; }
            .totals { float: right !important; width: 300px; }
            .footer-content { page-break-inside: avoid; }
        }
    </style>
</head>
<body>

<div id="login-trigger" class="no-print" onclick="promptLogin()">⚙️</div>

<div id="admin-panel" class="no-print">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>Arhiva</h2>
        <button class="btn" style="background:#666;" onclick="closeAdmin()">Zatvori X</button>
    </div>
    <div id="admin-list"></div>
</div>

<div class="container">
    <div class="logo-container">
        <img src="logo.png" alt="Logo" onerror="this.style.display='none';">
    </div>

    <div class="header-info">
        <h2 style="margin:0;">Gradnja Penava</h2>
        <p style="font-size:0.9em; line-height:1.4; margin-bottom: 5px;">
            Gradnja Penava vl. Josip Penava<br>
            Vitina 426, Ljubuški<br>
            ID broj: 4372882170003<br>
            Račun: 1613000133054082
        </p>
        <div style="display: flex; align-items: center; gap: 5px; font-size: 0.9em;">
            <strong>Datum ponude:</strong>
            <input type="text" id="manualDate" style="border: none; border-bottom: 1px solid #eee; padding: 2px;" placeholder="Upiši datum">
        </div>
    </div>

    <div class="client-box">
        <strong>Naručitelj:</strong>
        <input type="text" id="cName" placeholder="Ime/Naziv" value="Srednja strukovna škola Ruđera Boškovića">
        <input type="text" id="cAddr" placeholder="Adresa" value="Sestre Silvije Antić 1, Humac 88320">
        <input type="text" id="cCity" placeholder="Grad i država" value="Ljubuški, Bosna i Hercegovina">
    </div>

    <div style="text-align:center; margin-bottom:20px;">
        <span style="font-size: 1.2em; font-weight: bold;">PONUDA br.</span>
        <input type="text" id="offerNum" style="font-size:1.2em; font-weight:bold; width: 60px; border:none; border-bottom: 2px solid #eee; text-align: center;" value="1">
    </div>

    <table>
        <thead>
            <tr>
                <th style="width:30px">Rb</th>
                <th>Opis radova</th>
                <th style="width:80px">m2</th>
                <th style="width:100px">KM/m2</th>
                <th style="width:120px">Ukupno</th>
                <th class="action-col no-print" style="width:40px"></th>
            </tr>
        </thead>
        <tbody id="items-body"></tbody>
    </table>

    <div class="no-print">
        <button class="btn btn-add" onclick="addRow()">+ Dodaj stavku</button>
    </div>

    <div class="totals-wrapper">
        <div class="totals">
            <div><span>Ukupno:</span> <span id="sub">0,00 KM</span></div>
            <div><span>PDV 17%:</span> <span id="vat">0,00 KM</span></div>
            <div class="grand-total"><span>ZA PLATITI:</span> <span id="total">0,00 KM</span></div>
        </div>
        <div style="clear:both;"></div>
    </div>

    <div class="footer-content">
        <div style="padding-top:20px">
            <strong>Napomena:</strong>
            <div class="print-text" id="notes-print"></div>
            <textarea id="notes" rows="3" oninput="document.getElementById('notes-print').innerText=this.value; this.style.height='';this.style.height=this.scrollHeight+'px'">- Materijal nije uključen u stavke.
- Rok izvođenja po dogovoru.</textarea>
        </div>

        <div style="margin-top: 40px; width: 200px; text-align:center; border-top: 1px solid #000; padding-top: 5px;">
            Potpis i pečat
        </div>

        <div class="thanks-msg">
            Hvala na povjerenju!
        </div>
    </div>
</div>

<div class="no-print" style="display: flex; gap: 10px; margin-top:20px; padding-bottom: 40px;">
    <button class="btn btn-save" onclick="saveData()">💾 SPREMI</button>
    <button class="btn btn-print" onclick="syncPrintText(); window.print()">🖨️ PRINT</button>
</div>

<script>
// --- FIREBASE KONFIGURACIJA (ZALIJEPI SVOJE PODATKE) ---
const firebaseConfig = {
  apiKey: "AIzaSyA5Ad3k0aNnXdtIelhB-Ygt926AiLkpXLw",
  authDomain: "ponude---penava.firebaseapp.com",
  projectId: "ponude---penava",
  storageBucket: "ponude---penava.firebasestorage.app",
  messagingSenderId: "879052196775",
  appId: "1:879052196775:web:fa6338707f326635ca8482"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function format(n) { return n.toLocaleString('hr-HR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

function syncPrintText() {
    document.querySelectorAll('#items-body tr').forEach(r => {
        r.querySelector('.print-text').innerText = r.querySelector('.desc').value;
    });
    document.getElementById('notes-print').innerText = document.getElementById('notes').value;
}

function calculate() {
    let s = 0;
    const rows = document.querySelectorAll('#items-body tr');
    rows.forEach((r, i) => {
        r.cells[0].innerText = i + 1;
        let q = parseFloat(r.querySelector('.qty').value) || 0;
        let p = parseFloat(r.querySelector('.price').value) || 0;
        let t = q * p;
        r.querySelector('.row-t').innerText = format(t);
        s += t;
    });
    let v = s * 0.17;
    document.getElementById('sub').innerText = format(s) + " KM";
    document.getElementById('vat').innerText = format(v) + " KM";
    document.getElementById('total').innerText = format(s + v) + " KM";
}

function addRow(d='', q=0, p=0) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td data-label="Rb" style="text-align:center"></td>
        <td data-label="Opis">
            <div class="print-text"></div>
            <textarea class="desc" oninput="this.previousElementSibling.innerText=this.value; this.style.height='';this.style.height=this.scrollHeight+'px'">${d}</textarea>
        </td>
        <td data-label="m2"><input type="number" class="qty" value="${q}" oninput="calculate()"></td>
        <td data-label="KM/m2"><input type="number" class="price" value="${p}" oninput="calculate()"></td>
        <td data-label="Ukupno" class="row-t" style="text-align:right">0,00</td>
        <td class="action-col no-print"><button onclick="this.parentElement.parentElement.remove();calculate()" style="color:red; border:none; background:none; cursor:pointer; font-size:18px;">🗑️</button></td>
    `;
    document.getElementById('items-body').appendChild(tr);
    const ta = tr.querySelector('textarea');
    tr.querySelector('.print-text').innerText = d;
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
    calculate();
}

async function saveData() {
    const items = [];
    document.querySelectorAll('#items-body tr').forEach(r => {
        items.push({ d: r.querySelector('.desc').value, q: parseFloat(r.querySelector('.qty').value), p: parseFloat(r.querySelector('.price').value) });
    });
    const data = {
        name: document.getElementById('cName').value,
        addr: document.getElementById('cAddr').value,
        city: document.getElementById('cCity').value,
        num: document.getElementById('offerNum').value,
        manualDate: document.getElementById('manualDate').value,
        note: document.getElementById('notes').value,
        items: items,
        total: document.getElementById('total').innerText,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    try { await db.collection("ponude").add(data); alert("Spremljeno!"); } catch (e) { alert("Greška!"); }
}

function promptLogin() { if (prompt("Lozinka:") === "789xy1234") openAdmin(); }

async function openAdmin() {
    document.getElementById('admin-panel').style.display = 'block';
    const list = document.getElementById('admin-list');
    list.innerHTML = "Učitavam...";
    const snap = await db.collection("ponude").orderBy("createdAt", "desc").get();
    list.innerHTML = "";
    snap.forEach(doc => {
        const d = doc.data();
        const div = document.createElement('div');
        div.style = "padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;";
        div.innerHTML = `<span>Br. ${d.num} - ${d.name}</span><button class="btn" style="background:#008CBA; padding:5px 10px;" onclick="loadOffer('${doc.id}')">Učitaj</button>`;
        list.appendChild(div);
    });
}

async function loadOffer(id) {
    const doc = await db.collection("ponude").doc(id).get();
    const d = doc.data();
    document.getElementById('cName').value = d.name;
    document.getElementById('cAddr').value = d.addr;
    document.getElementById('cCity').value = d.city;
    document.getElementById('offerNum').value = d.num;
    document.getElementById('manualDate').value = d.manualDate || "";
    document.getElementById('notes').value = d.note;
    document.getElementById('items-body').innerHTML = "";
    d.items.forEach(i => addRow(i.d, i.q, i.p));
    syncPrintText();
    closeAdmin();
}

function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

window.onload = () => { 
    addRow("Zaštita i priprema zidova i plafona za molovanje (bez materijala)", 3900, 1); 
    addRow("Molovanje zidova i plafona disperzivnom bojom, 2 premaza u jednom svijetlom tonu (bez materijala)", 3900, 5); 
    syncPrintText();
};
</script>
</body>
</html>
